    Export:
      Name: !Sub '${AWS::StackName}-PlantDefinitionsTableArn'

  IAMRoleArn:
    Description: ARN of the Lambda execution role
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IAMRoleArn'

  ApiGatewayUrl:
    Description: URL of the API Gateway endpoint
    Value: !Sub 'https://${GardeningAgentApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiGatewayStage}/advice'
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayUrl'

  ApiGatewayId:
    Description: ID of the API Gateway
    Value: !Ref GardeningAgentApi
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayId'

  ApiGatewayStageName:
    Description: Name of the API Gateway stage
    Value: !Ref ApiGatewayStage
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayStageName'

  CognitoUserPoolId:
    Description: Cognito User Pool ID for frontend configuration
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub '${AWS::StackName}-CognitoUserPoolId'

  CognitoUserPoolClientId:
    Description: Cognito User Pool Client ID for frontend configuration
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub '${AWS::StackName}-CognitoUserPoolClientId'