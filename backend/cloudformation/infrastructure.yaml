AWSTemplateFormatVersion: '2010-09-09'
Description: 'Infrastructure for Gardening Weather Advisor Agent'

Parameters:
  Environment:
    Type: String
    Default: dev
    Description: Environment name for resource naming
    AllowedValues:
      - dev
      - staging
      - prod

  UserDataTableName:
    Type: String
    Default: plant_database_users
    Description: Name for the user data DynamoDB table

  PlantDefinitionsTableName:
    Type: String
    Default: garden_plants
    Description: Name for the plant definitions DynamoDB table

  LambdaFunctionName:
    Type: String
    Default: gardening-agent
    Description: Name for the Lambda function

  BedrockRegion:
    Type: String
    Default: eu-west-2
    Description: AWS region for Bedrock model access

  GardenDataTableName:
    Type: String
    Default: GardenData
    Description: Name for the GardenData DynamoDB table (single-table design)

  UserProfilesTableName:
    Type: String
    Default: UserProfiles
    Description: Name for the UserProfiles DynamoDB table

  WateringScheduleTableName:
    Type: String
    Default: WateringSchedule
    Description: Name for the WateringSchedule DynamoDB table

  CareInstructionsTableName:
    Type: String
    Default: CareInstructions
    Description: Name for the CareInstructions DynamoDB table

  LambdaLayerArn:
    Type: String
    Description: ARN of the existing Lambda layer containing shared Python dependencies

  CodeS3Bucket:
    Type: String
    Default: ""
    Description: S3 bucket containing Lambda deployment package (optional)

  CodeS3Key:
    Type: String
    Default: ""
    Description: S3 key for Lambda deployment package (optional)

Resources:
  # Cognito User Pool
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${LambdaFunctionName}-user-pool-${Environment}'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      UserPoolTags:
        Environment: !Ref Environment
        Application: gardening-agent

  # Cognito User Pool Client
  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${LambdaFunctionName}-client-${Environment}'
      UserPoolId: !Ref CognitoUserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        RefreshToken: days

  # Cognito API Authorizer
  CognitoApiAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: !Sub '${LambdaFunctionName}-cognito-authorizer-${Environment}'
      RestApiId: !Ref GardeningAgentApi
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - !GetAtt CognitoUserPool.Arn
      AuthorizerResultTtlInSeconds: 300

  # Gateway Response for 401 Unauthorized (adds CORS headers before Lambda runs)
  GatewayResponseUnauthorized:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResponseType: UNAUTHORIZED
      StatusCode: '401'
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
      ResponseTemplates:
        application/json: |
          {
            "error": "unauthorized",
            "message": "$context.authorizer.claims",
            "code": "$context.error.responseType"
          }

  # Gateway Response for 403 Access Denied (adds CORS headers before Lambda runs)
  GatewayResponseAccessDenied:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResponseType: ACCESS_DENIED
      StatusCode: '403'
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
      ResponseTemplates:
        application/json: |
          {
            "error": "access_denied",
            "message": "$context.error.message",
            "code": "$context.error.responseType"
          }

  # IAM Role for Lambda Function
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${LambdaFunctionName}-${Environment}-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt UserDataTable.Arn
                  - !GetAtt PlantDefinitionsTable.Arn
                  - !GetAtt GardenDataTable.Arn
                  - !GetAtt UserProfilesTable.Arn
                  - !GetAtt WateringScheduleTable.Arn
                  - !GetAtt CareInstructionsTable.Arn
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub '${PhotoStorageBucket.Arn}/*'
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub '${PhotoStorageBucket.Arn}/photos/*'
        - PolicyName: SelfInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt GardeningApiHandlerFunction.Arn
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: !Sub 'arn:aws:bedrock:${BedrockRegion}:*:foundation-model/amazon.nova-lite-v1:0'

  # User Data DynamoDB Table
  UserDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${UserDataTableName}-${Environment}'
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: gardening-agent

  # Plant Definitions DynamoDB Table
  PlantDefinitionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${PlantDefinitionsTableName}-${Environment}'
      AttributeDefinitions:
        - AttributeName: plant_id
          AttributeType: S
      KeySchema:
        - AttributeName: plant_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: gardening-agent

  # GardenData DynamoDB Table (Single Table Design)
  GardenDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${GardenDataTableName}-${Environment}'
      AttributeDefinitions:
        - AttributeName: garden_id
          AttributeType: S
        - AttributeName: sort_key
          AttributeType: S
      KeySchema:
        - AttributeName: garden_id
          KeyType: HASH
        - AttributeName: sort_key
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: gardening-agent

  # UserProfiles DynamoDB Table
  UserProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${UserProfilesTableName}-${Environment}'
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: gardening-agent

  # WateringSchedule DynamoDB Table with TTL
  WateringScheduleTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${WateringScheduleTableName}-${Environment}'
      AttributeDefinitions:
        - AttributeName: garden_id
          AttributeType: S
        - AttributeName: scheduled_date_instance_id
          AttributeType: S
      KeySchema:
        - AttributeName: garden_id
          KeyType: HASH
        - AttributeName: scheduled_date_instance_id
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: gardening-agent

  # CareInstructions DynamoDB Table
  CareInstructionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${CareInstructionsTableName}-${Environment}'
      AttributeDefinitions:
        - AttributeName: species_id
          AttributeType: S
        - AttributeName: instruction_id
          AttributeType: S
      KeySchema:
        - AttributeName: species_id
          KeyType: HASH
        - AttributeName: instruction_id
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: gardening-agent

  # S3 Photo Storage Bucket
  PhotoStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'gardening-photos-${Environment}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 90
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
            AllowedOrigins:
              - '*'
            MaxAge: 3600
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: gardening-agent

  # Lambda Function
  GardeningAgentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${LambdaFunctionName}-${Environment}'
      Runtime: python3.13
      Handler: src.agent.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          # Placeholder code - actual deployment will use packaged source
          def lambda_handler(event, context):
              return {"statusCode": 200, "body": "Function created successfully"}
      Environment:
        Variables:
          USER_DATA_TABLE_NAME: !Ref UserDataTable
          PLANT_DEFINITIONS_TABLE_NAME: !Ref PlantDefinitionsTable
          BEDROCK_REGION: !Ref BedrockRegion
      Timeout: 300
      MemorySize: 512
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: gardening-agent

  # API Handler Lambda Function (routes all /api/v1/* requests)
  GardeningApiHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'gardening-api-handler-${Environment}'
      Runtime: python3.13
      Handler: src/api/router.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref LambdaLayerArn
      Code:
        ZipFile: |
          # Placeholder code - actual deployment will use packaged source
          def lambda_handler(event, context):
              return {"statusCode": 200, "body": "Function created successfully"}
      Environment:
        Variables:
          GARDEN_DATA_TABLE_NAME: !Ref GardenDataTable
          USER_PROFILES_TABLE_NAME: !Ref UserProfilesTable
          WATERING_SCHEDULE_TABLE_NAME: !Ref WateringScheduleTable
          CARE_INSTRUCTIONS_TABLE_NAME: !Ref CareInstructionsTable
          SPECIES_TABLE_NAME: !Ref PlantDefinitionsTable
          PHOTO_BUCKET_NAME: !Ref PhotoStorageBucket
          LAMBDA_FUNCTION_NAME: !Sub 'gardening-api-handler-${Environment}'
          BEDROCK_REGION: !Ref BedrockRegion
      Timeout: 30
      MemorySize: 256
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: gardening-agent

  # Lambda Permission for API Gateway to invoke the API handler function
  ApiHandlerLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GardeningApiHandlerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${GardeningAgentApi}/*/*'

  # API Gateway REST API
  GardeningAgentApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${LambdaFunctionName}-api-${Environment}'
      Description: REST API for Gardening Agent
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: gardening-agent

  # API Gateway Resource for /advice endpoint
  AdviceResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ParentId: !GetAtt GardeningAgentApi.RootResourceId
      PathPart: advice

  # POST Method for /advice endpoint with Lambda proxy integration
  AdvicePostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResourceId: !Ref AdviceResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GardeningAgentFunction.Arn}/invocations'

  # OPTIONS Method for CORS preflight requests
  AdviceOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResourceId: !Ref AdviceResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # /api resource
  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ParentId: !GetAtt GardeningAgentApi.RootResourceId
      PathPart: api

  # /api/v1 resource
  ApiV1Resource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ParentId: !Ref ApiResource
      PathPart: v1

  # /api/v1/plants resource
  PlantsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ParentId: !Ref ApiV1Resource
      PathPart: plants

  PlantsGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResourceId: !Ref PlantsResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GardeningApiHandlerFunction.Arn}/invocations'

  PlantsOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResourceId: !Ref PlantsResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        PassthroughBehavior: WHEN_NO_MATCH
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # /api/v1/plants/{instance_id} resource
  PlantInstanceResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ParentId: !Ref PlantsResource
      PathPart: '{instance_id}'

  PlantInstanceGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResourceId: !Ref PlantInstanceResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GardeningApiHandlerFunction.Arn}/invocations'

  PlantInstanceOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResourceId: !Ref PlantInstanceResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        PassthroughBehavior: WHEN_NO_MATCH
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # /api/v1/plants/{instance_id}/action-logs resource
  PlantActionLogsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ParentId: !Ref PlantInstanceResource
      PathPart: action-logs

  PlantActionLogsGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResourceId: !Ref PlantActionLogsResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GardeningApiHandlerFunction.Arn}/invocations'

  PlantActionLogsPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResourceId: !Ref PlantActionLogsResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GardeningApiHandlerFunction.Arn}/invocations'

  PlantActionLogsOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResourceId: !Ref PlantActionLogsResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        PassthroughBehavior: WHEN_NO_MATCH
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # /api/v1/plants/{instance_id}/photos resource
  PlantPhotosResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ParentId: !Ref PlantInstanceResource
      PathPart: photos

  PlantPhotosGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResourceId: !Ref PlantPhotosResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GardeningApiHandlerFunction.Arn}/invocations'

  PlantPhotosOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResourceId: !Ref PlantPhotosResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        PassthroughBehavior: WHEN_NO_MATCH
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # /api/v1/plants/{instance_id}/care-instructions resource
  PlantCareInstructionsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ParentId: !Ref PlantInstanceResource
      PathPart: care-instructions

  PlantCareInstructionsGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResourceId: !Ref PlantCareInstructionsResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GardeningApiHandlerFunction.Arn}/invocations'

  PlantCareInstructionsOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResourceId: !Ref PlantCareInstructionsResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        PassthroughBehavior: WHEN_NO_MATCH
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # /api/v1/action-logs resource
  ActionLogsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ParentId: !Ref ApiV1Resource
      PathPart: action-logs

  ActionLogsGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResourceId: !Ref ActionLogsResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GardeningApiHandlerFunction.Arn}/invocations'

  ActionLogsOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref GardeningAgentApi
      ResourceId: !Ref ActionLogsResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
